<!DOCTYPE html>
<html>

<head>
  <title>GameSeeds</title>
</head>

<body>
  <h1>GameSeeds</h1>

  {% if session.username %}
  <p>
    Logged in as {{ session.username }}
  </p>
  {% endif %}

  <p>
    <a href="/login">Login</a>
    <a href="/register">Register</a>
    <a href="/logout">Logout</a>
  </p>

  <p>
    <a href=/new_item>New Seed<a/>
  </p>

  <h2>Posts</h2>
  <form action="/" method="get">
    <p>Search: <input type="text" name="query" value="{{ query }}"> <input type="submit" value="Search"></p>
  </form>
    <ul>
    {% for item in items %}
    <li><a href="/item/{{  item.id  }}">{{ item.title }}</a></li>
    {% endfor %}
    </ul>
</body>

</html>
