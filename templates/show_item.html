<!DOCTYPE html>
<html>

<head>
  <title>{{ item.title }}</title>
</head>

<body>
  <h1>{{ item.title }}</h1>
  <h3>{{ item.game }}</h3>
  <h3>{{ item.seed }}</h3>
  <p>
  OP: {{ item.username }}
  </p>
  <p>
  {{ item.description }}
  </p>
  <p>
    <a href="/">Back</a>
    {% if session.user_id == item.user_id %}
    <a href="/edit_item/{{ item.id }}">Edit</a>
    {% endif %}
  </p>
</body>

</html>
